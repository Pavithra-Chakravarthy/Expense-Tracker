<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamic Expense Tracker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f7fb;
      display:flex;
      justify-content:center;
      padding:40px 15px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#fff;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .balance{
      text-align:center;
      margin-bottom:20px;
    }

    .balance h2{
      margin-top:10px;
      color:#1b5e20;
      font-size:32px;
    }

    .summary{
      display:flex;
      justify-content:space-between;
      margin-bottom:25px;
      gap:10px;
    }

    .card{
      flex:1;
      background:#f1f1f1;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }

    .income-text{
      color:green;
      margin-top:8px;
      font-weight:bold;
    }

    .expense-text{
      color:red;
      margin-top:8px;
      font-weight:bold;
    }

    form{
      margin-bottom:25px;
    }

    form input,
    form select,
    form button{
      width:100%;
      padding:12px;
      margin-bottom:12px;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:16px;
    }

    form button{
      background:#1976d2;
      color:white;
      border:none;
      cursor:pointer;
      transition:0.3s;
    }

    form button:hover{
      background:#0d47a1;
    }

    .transactions h3{
      margin-bottom:15px;
      color:#333;
    }

    .transaction{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px;
      margin-bottom:10px;
      border-radius:8px;
      background:#fafafa;
      border-right:6px solid;
    }

    .transaction.income{
      border-color:green;
    }

    .transaction.expense{
      border-color:red;
    }

    .left{
      display:flex;
      flex-direction:column;
    }

    .delete-btn{
      background:red;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:5px;
      cursor:pointer;
    }

    .empty{
      text-align:center;
      color:gray;
      margin-top:10px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Expense Tracker</h1>

    <div class="balance">
      <p>Your Balance</p>
      <h2 id="balance">₹0.00</h2>
    </div>

    <div class="summary">
      <div class="card">
        <h4>Income</h4>
        <p class="income-text" id="income">₹0.00</p>
      </div>

      <div class="card">
        <h4>Expense</h4>
        <p class="expense-text" id="expense">₹0.00</p>
      </div>
    </div>

    <form id="transaction-form">

      <input 
        type="text" 
        id="description" 
        placeholder="Enter description"
        required
      />

      <input 
        type="number" 
        id="amount" 
        placeholder="Enter amount"
        required
      />

      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <button type="submit">Add Transaction</button>

    </form>

    <div class="transactions">
      <h3>Transaction History</h3>

      <div id="transaction-list"></div>

      <p class="empty" id="emptyMessage">
        No transactions added yet.
      </p>
    </div>

  </div>

  <script>
    const form = document.getElementById("transaction-form");
    const description = document.getElementById("description");
    const amount = document.getElementById("amount");
    const type = document.getElementById("type");

    const balance = document.getElementById("balance");
    const income = document.getElementById("income");
    const expense = document.getElementById("expense");

    const transactionList = document.getElementById("transaction-list");
    const emptyMessage = document.getElementById("emptyMessage");

    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    function saveTransactions() {
      localStorage.setItem("transactions", JSON.stringify(transactions));
    }

    function updateUI() {

      transactionList.innerHTML = "";

      let totalIncome = 0;
      let totalExpense = 0;

      if (transactions.length === 0) {
        emptyMessage.style.display = "block";
      } else {
        emptyMessage.style.display = "none";
      }

      transactions.forEach((transaction, index) => {

        const div = document.createElement("div");
        div.classList.add("transaction");
        div.classList.add(transaction.type);

        div.innerHTML = `
          <div class="left">
            <strong>${transaction.description}</strong>
            <small>${transaction.type}</small>
          </div>

          <div>
            ₹${transaction.amount}

            <button class="delete-btn" onclick="deleteTransaction(${index})">
              X
            </button>
          </div>
        `;

        transactionList.appendChild(div);

        if (transaction.type === "income") {
          totalIncome += transaction.amount;
        } else {
          totalExpense += transaction.amount;
        }
      });

      const totalBalance = totalIncome - totalExpense;

      income.innerText = `₹${totalIncome.toFixed(2)}`;
      expense.innerText = `₹${totalExpense.toFixed(2)}`;
      balance.innerText = `₹${totalBalance.toFixed(2)}`;

      saveTransactions();
    }

    function deleteTransaction(index) {
      transactions.splice(index, 1);
      updateUI();
    }

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const transaction = {
        description: description.value,
        amount: Number(amount.value),
        type: type.value
      };

      transactions.push(transaction);

      updateUI();

      form.reset();
    });

    updateUI();
  </script>

</body>
</html>
